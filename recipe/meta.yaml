{% set name = "nipy" %}
{% set version = "0.6.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/nipy/nipy/archive/refs/tags/{{ version }}.tar.gz
  sha256: 79babfd76618a3573a4d5920d1fe46829a19df92ff3b98efa16bd9a51f7a7610

build:
  entry_points:
    - nipy_3dto4d = nipy.cli.img3dto4d:main
    - nipy_4dto3d = nipy.cli.img4dto3d:main
    - nipy_4d_realign = nipy.cli.realign4d:main
    - nipy_tsdiffana = nipy.cli.tsdiffana:main
    - nipy_diagnose = nipy.cli.diagnose:main
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
  host:
    - python
    - meson-python >=0.13
    - ninja
    - setuptools
    - cython >=3
    - pip
    - numpy >=1.22
  run:
    - python
    - numpy >=1.22
    - scipy >=1.8
    - nibabel >=3.2
    - sympy >=1.9
    - transforms3d

test:
  imports:
    - nipy
  commands:
    - pip check
    - nipy_3dto4d --help
    - nipy_4dto3d --help
    - nipy_4d_realign --help
    - nipy_tsdiffana --help
    - nipy_diagnose --help
  requires:
    - pip
    - matplotlib

about:
  home: http://nipy.org/nipy
  license: BSD-3-Clause
  license_file: LICENSE
  summary: 'Neuroimaging in Python FMRI analysis package'

extra:
  recipe-maintainers:
    - ocefpaf
